name: GoogleカレンダーからNotionへの同期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # 毎日午前9時 (JST) に実行

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 依存関係をインストールする
        run: |
          pip install requests icalendar pytz

      - name: Pythonスクリプトを作成して実行する
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          CALENDAR_ICS_URL: ${{ secrets.GOOGLE_API_CREDENTIALS }} # Secretsの名前はそのまま流用
        run: |
          cat << 'EOF' > script.py
          import os
          import requests
          from icalendar import Calendar
          from datetime import datetime, timedelta
          import pytz

          # --- 設定 ---
          NOTION_API_TOKEN = os.environ.get("NOTION_API_TOKEN")
          NOTION_DATABASE_ID = os.environ.get("NOTION_DATABASE_ID")
          CALENDAR_ICS_URL = os.environ.get("CALENDAR_ICS_URL")
          TARGET_HASHTAG = "#退去立会"
          TIMEZONE = "Asia/Tokyo"

          # --- Notionページ作成関数 ---
          def create_notion_page(event_summary, event_start_date):
              headers = {
                  "Authorization": f"Bearer {NOTION_API_TOKEN}",
                  "Content-Type": "application/json",
                  "Notion-Version": "2022-06-28",
              }

              # アパート名・号室を抽出
              title = event_summary.replace("【立ち会い】", "").strip()

              # 通電開始日と停止日を計算
              power_on_date = event_start_date + timedelta(days=1)
              power_off_date = power_on_date + timedelta(days=30)

              new_page_data = {
                  "parent": {"database_id": NOTION_DATABASE_ID},
                  "properties": {
                      "アパート名・号室": {"title": [{"text": {"content": title}}]},
                      "通電開始": {"date": {"start": power_on_date.strftime('%Y-%m-%d')}},
                      "通電停止": {"date": {"start": power_off_date.strftime('%Y-%m-%d')}},
                      # 地点コードと補足1はカレンダー情報から取得できないため空欄
                      "地点コード": {"rich_text": [{"text": {"content": ""}}]},
                      "補足1": {"rich_text": [{"text": {"content": ""}}]},
                  },
              }

              response = requests.post("https://api.notion.com/v1/pages", headers=headers, json=new_page_data )

              if response.status_code == 200:
                  print(f"Successfully created page for: {title}")
              else:
                  print(f"Failed to create page for: {title}")
                  print(f"Status Code: {response.status_code}")
                  print(f"Response: {response.text}")

          # --- Googleカレンダーイベント取得関数 (ICS) ---
          def get_calendar_events():
              try:
                  response = requests.get(CALENDAR_ICS_URL)
                  response.raise_for_status()
                  cal = Calendar.from_ical(response.text)
                  
                  jst = pytz.timezone(TIMEZONE)
                  today = datetime.now(jst).date()
                  
                  found_events = []

                  for component in cal.walk():
                      if component.name == "VEVENT":
                          description = str(component.get('description', ''))
                          if TARGET_HASHTAG in description:
                              event_start_dt = component.get('dtstart').dt
                              # タイムゾーン情報がない場合はJSTとして扱う
                              if isinstance(event_start_dt, datetime) and event_start_dt.tzinfo is None:
                                  event_start_dt = jst.localize(event_start_dt)
                              
                              event_start_date = event_start_dt.date()

                              # 契約終了日が今日から過去30日以内のものを対象とする
                              if today - timedelta(days=30) <= event_start_date <= today:
                                  summary = str(component.get('summary'))
                                  found_events.append({'summary': summary, 'start_date': event_start_date})
                  
                  return found_events

              except Exception as e:
                  print(f"Error fetching or parsing calendar: {e}")
                  return []

          # --- メイン処理 ---
          if __name__ == "__main__":
              print("--- Calendar to Notion Sync Start ---")
              events = get_calendar_events()
              if not events:
                  print(f"No upcoming events with '{TARGET_HASHTAG}' found.")
              else:
                  print(f"Found {len(events)} events to process.")
                  for event in events:
                      create_notion_page(event['summary'], event['start_date'])
              print("--- Sync Finished ---")

          EOF
          python script.py

