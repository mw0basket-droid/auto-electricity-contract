name: GoogleカレンダーからGoogle Sheetsへの同期

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *' # 毎日午前8:00 JST (UTC 23:00) に実行

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 依存関係をインストールする
        run: |
          pip install requests icalendar pytz gspread google-auth

      - name: Pythonスクリプトを作成して実行する
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          CALENDAR_ICS_URL: ${{ secrets.CALENDAR_ICS_URL }}
        run: |
          cat << 'PYEOF' > script.py
          import os
          import json
          import re
          import requests
          import gspread
          from google.oauth2.service_account import Credentials
          from icalendar import Calendar
          from datetime import datetime, timedelta, date
          import pytz

          # --- 設定 ---
          GOOGLE_CREDENTIALS_JSON = os.environ.get("GOOGLE_CREDENTIALS")
          SPREADSHEET_ID = os.environ.get("SPREADSHEET_ID")
          CALENDAR_ICS_URL = os.environ.get("CALENDAR_ICS_URL")
          TARGET_HASHTAG = "#退去立会"
          TIMEZONE = "Asia/Tokyo"

          # --- 説明欄をパースする関数 ---
          def parse_description(description):
              result = {
                  "地点コード": "",
                  "補足1": "",
                  "通電開始": "",
                  "通電停止": ""
              }
              if not description:
                  return result
              description = description.replace("｜", "|")
              parts = description.split("|")
              for part in parts:
                  part = part.strip()
                  if "地点コード" in part:
                      m = re.search(r'地点コード[：:]\s*(\S+)', part)
                      if m:
                          result["地点コード"] = m.group(1)
                  elif "補足1" in part:
                      m = re.search(r'補足1[：:]\s*(\S+)', part)
                      if m:
                          result["補足1"] = m.group(1)
                  elif "通電開始" in part:
                      m = re.search(r'通電開始[：:]\s*(\d{4}[/\-]\d{1,2}[/\-]\d{1,2})', part)
                      if m:
                          d_str = m.group(1).replace('/', '-')
                          parts2 = d_str.split('-')
                          d = date(int(parts2[0]), int(parts2[1]), int(parts2[2]))
                          result["通電開始"] = d.strftime('%Y-%m-%d')
                  elif "通電停止" in part:
                      m = re.search(r'通電停止[：:]\s*(\d{4}[/\-]\d{1,2}[/\-]\d{1,2})', part)
                      if m:
                          d_str = m.group(1).replace('/', '-')
                          parts2 = d_str.split('-')
                          d = date(int(parts2[0]), int(parts2[1]), int(parts2[2]))
                          result["通電停止"] = d.strftime('%Y-%m-%d')
              return result

          # --- Google Sheets クライアント初期化 ---
          def get_sheets_client():
              creds_dict = json.loads(GOOGLE_CREDENTIALS_JSON)
              scopes = [
                  "https://spreadsheets.google.com/feeds",
                  "https://www.googleapis.com/auth/spreadsheets",
                  "https://www.googleapis.com/auth/drive"
              ]
              creds = Credentials.from_service_account_info(creds_dict, scopes=scopes)
              return gspread.authorize(creds)

          # --- Google Sheetsに行を追加する関数 ---
          def add_row_to_sheet(client, event_summary, event_start_date, parsed):
              spreadsheet = client.open_by_key(SPREADSHEET_ID)
              sheet = spreadsheet.sheet1

              existing = sheet.get_all_values()
              if not existing or (len(existing) > 0 and existing[0][0] != "アパート名・号室"):
                  headers = ["アパート名・号室", "通電開始", "通電停止", "地点コード", "補足1", "ステータス", "登録日時"]
                  sheet.insert_row(headers, 1)

              title = re.sub(r'【.*?】', '', event_summary).strip()

              if parsed["通電開始"]:
                  power_on_str = parsed["通電開始"]
              else:
                  power_on_date = event_start_date + timedelta(days=1)
                  power_on_str = power_on_date.strftime('%Y-%m-%d')

              if parsed["通電停止"]:
                  power_off_str = parsed["通電停止"]
              else:
                  power_on_date_obj = datetime.strptime(power_on_str, '%Y-%m-%d').date()
                  power_off_str = (power_on_date_obj + timedelta(days=30)).strftime('%Y-%m-%d')

              all_rows = sheet.get_all_values()
              for row in all_rows[1:]:
                  if len(row) >= 2 and row[0] == title and row[1] == power_on_str:
                      print(f"スキップ（重複）: {title}")
                      return None

              now_jst = datetime.now(pytz.timezone(TIMEZONE)).strftime("%Y-%m-%d %H:%M")
              new_row = [
                  title,
                  power_on_str,
                  power_off_str,
                  parsed["地点コード"],
                  parsed["補足1"],
                  "未処理",
                  now_jst
              ]
              sheet.append_row(new_row)
              print(f"✅ Sheets追加成功: {title} (通電開始: {power_on_str})")
              return {
                  "title": title,
                  "power_on": power_on_str,
                  "power_off": power_off_str,
                  "chiten_code": parsed["地点コード"],
                  "hosoku1": parsed["補足1"]
              }

          # --- Googleカレンダーイベント取得関数 (ICS) ---
          def get_calendar_events():
              try:
                  response = requests.get(CALENDAR_ICS_URL)
                  response.raise_for_status()
                  cal = Calendar.from_ical(response.text)
                  jst = pytz.timezone(TIMEZONE)
                  tomorrow = datetime.now(jst).date() + timedelta(days=1)
                  print(f"対象日（明日）: {tomorrow}")
                  found_events = []
                  for component in cal.walk():
                      if component.name == "VEVENT":
                          description = str(component.get('description', ''))
                          if TARGET_HASHTAG in description:
                              event_dt = component.get('dtstart').dt
                              event_start_date = None
                              if isinstance(event_dt, datetime):
                                  if event_dt.tzinfo is None:
                                      event_dt = jst.localize(event_dt)
                                  event_start_date = event_dt.astimezone(jst).date()
                              elif isinstance(event_dt, date):
                                  event_start_date = event_dt
                              if event_start_date and event_start_date == tomorrow:
                                  summary = str(component.get('summary'))
                                  parsed = parse_description(description)
                                  found_events.append({
                                      'summary': summary,
                                      'start_date': event_start_date,
                                      'parsed': parsed
                                  })
                                  print(f"対象イベント発見: {summary} | {parsed}")
                  return found_events
              except Exception as e:
                  print(f"カレンダー取得エラー: {e}")
                  import traceback
                  traceback.print_exc()
                  return []

          # --- メイン処理 ---
          if __name__ == "__main__":
              print("--- Calendar to Google Sheets Sync Start ---")

              if not GOOGLE_CREDENTIALS_JSON:
                  print("エラー: GOOGLE_CREDENTIALS が設定されていません")
                  exit(1)
              if not SPREADSHEET_ID:
                  print("エラー: SPREADSHEET_ID が設定されていません")
                  exit(1)
              if not CALENDAR_ICS_URL:
                  print("エラー: CALENDAR_ICS_URL が設定されていません")
                  exit(1)

              try:
                  client = get_sheets_client()
                  print("✅ Google Sheets接続成功")
              except Exception as e:
                  print(f"Google Sheets接続エラー: {e}")
                  import traceback
                  traceback.print_exc()
                  exit(1)

              events = get_calendar_events()
              pending_applications = []

              if not events:
                  print("明日の対象イベントはありません。")
              else:
                  print(f"{len(events)}件のイベントを処理します。")
                  for event in events:
                      event_data = add_row_to_sheet(
                          client,
                          event['summary'],
                          event['start_date'],
                          event['parsed']
                      )
                      if event_data:
                          pending_applications.append(event_data)

              # Chrome拡張機能用のJSONファイルを出力
              from datetime import datetime as dt
              import pytz as tz
              jst = tz.timezone("Asia/Tokyo")
              output = {
                  "generated_at": dt.now(jst).strftime("%Y-%m-%d %H:%M:%S"),
                  "target_date": str(dt.now(jst).date() + timedelta(days=1)),
                  "applications": pending_applications
              }

              with open("pending_applications.json", "w", encoding="utf-8") as f:
                  json.dump(output, f, ensure_ascii=False, indent=2)

              print(f"✅ pending_applications.json を出力しました ({len(pending_applications)}件)")
              print("--- Sync Finished ---")
          PYEOF
          python script.py

      - name: JSONファイルをコミットしてプッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_applications.json
          git diff --staged --quiet || git commit -m "chore: 申請データを更新 $(date +'%Y-%m-%d')"
          git push

      - name: 完了通知
        if: always()
        run: echo "同期処理が完了しました。"
